services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investment_game
      POSTGRES_USER: game
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports: ["5432:5432"]
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://game:${POSTGRES_PASSWORD:-devpass}@db:5432/investment_game
      ENUMERATOR_TOKENS: ${ENUMERATOR_TOKENS:-dev-enum-token}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-dev-admin-token}
      PORT: 4000
    depends_on: [db]
    ports: ["4000:4000"]
    restart: unless-stopped

volumes:
  pgdata:
